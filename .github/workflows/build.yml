name: Build Magisk Module

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Build Zygisk Module
        run: |
          export NDK_PROJECT_PATH=.
          export NDK_APPLICATION_MK=jni/Application.mk
          ${{ steps.setup-ndk.outputs.ndk-path }}/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk

          # Move compiled .so files from libs/<abi>/libmodule.so to zygisk/<abi>.so
          mkdir -p zygisk
          if [ -d "libs" ]; then
            for abi_dir in libs/*; do
              if [ -d "$abi_dir" ]; then
                abi=$(basename "$abi_dir")
                if [ -f "$abi_dir/libmodule.so" ]; then
                  cp "$abi_dir/libmodule.so" "zygisk/${abi}.so"
                fi
              fi
            done
          fi

      - name: Create Module Zip
        run: |
          # Read module.prop to extract info
          MODID=$(grep '^id=' module.prop | cut -d'=' -f2)
          MODVERSION=$(grep '^version=' module.prop | cut -d'=' -f2 | tr -d '\r')

          # Gunakan format tag yang unik dengan short SHA agar tidak error jika push berulang di versi yang sama
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG_NAME="v${MODVERSION}-${SHORT_SHA}"

          ZIP_NAME="${MODID}_${TAG_NAME}.zip"

          echo "MODVERSION=${MODVERSION}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

          # Zip all relevant files, excluding git and workflow folders
          zip -r9 "$ZIP_NAME" . -x "*.git*" -x "*.github*" -x "*.DS_Store"

          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.TAG_NAME }}"
          name: "Release ${{ env.TAG_NAME }}"
          files: ${{ env.ZIP_FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Fallback)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_FILE }}
          path: ${{ env.ZIP_FILE }}
          compression-level: 0 # Disable double zip compression for artifacts
