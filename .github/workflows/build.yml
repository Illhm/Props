name: Build Magisk Module

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y zip

    - name: Create Module Zip
      run: |
        ZIP_NAME="DynamicPropSpoofer.zip"
        # Zip all files excluding .git and .github to ensure all module files are included
        zip -r9 $ZIP_NAME . -x "*.git*" -x ".github/*"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DynamicPropSpoofer
        path: |
          **/*
          !.git/**
          !.github/**
          !DynamicPropSpoofer.zip

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        files: DynamicPropSpoofer.zip
        tag_name: "v1.0-${{ github.run_number }}"
        name: "Release v1.0-${{ github.run_number }}"
        body: "Automated build of Dynamic Prop Spoofer module."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
