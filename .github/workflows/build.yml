name: Build and Sign APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "password123" \
            -keypass "password123" \
            -dname "CN=MockAPI, OU=Privacy, O=Privacy, L=Jakarta, ST=DKI Jakarta, C=ID"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Setup Android SDK Build-Tools
        uses: android-actions/setup-android@v3

      - name: Sign APK
        run: |
          BUILD_TOOLS_VERSION=$(ls -1 $ANDROID_HOME/build-tools | sort -rV | head -n 1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
          
          # Align APK
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk
          
          # Sign APK
          $APKSIGNER sign \
            --ks my-release-key.jks \
            --ks-key-alias my-key-alias \
            --ks-pass pass:"password123" \
            --key-pass pass:"password123" \
            --out app/build/outputs/apk/release/PrivacyMockAPI-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacyMockAPI-Release-APK
          path: app/build/outputs/apk/release/PrivacyMockAPI-release-signed.apk
          compression-level: 0
          
